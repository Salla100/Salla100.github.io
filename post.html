<head>
  <meta charset="UTF-8" />

  <link rel="canonical"           href="" />
  <!-- Twitter / X Card -->

  <meta name="twitter:title"      content="" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:image"      content="https://svenamberg.com/assets/og-image.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet" />

</head>
<body>

<canvas id="stars-canvas"></canvas>

<nav>
  <a class="nav-logo" href="index.html">&lt;sven.amberg /&gt;</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="cv.html">CV</a></li>

<main>
  <section id="post-container" style="padding-top: 8rem; min-height: 80vh;">
    <div class="loading">Loading…</div>
  </section>
</main>

<footer>Built with curiosity · Sven Amberg · Trondheim, Norway</footer>

<script src="js/main.js"></script>
<script>
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) window.location.href = 'blog.html';

  fetch('data/posts.json')
    .then(r => r.json())
    .then(posts => {
      const post = posts.find(p => p.id === id);
      const container = document.getElementById('post-container');

      if (!post) {
        container.innerHTML = `
          <a class="post-back" href="blog.html">← Back to blog</a>
          <p style="color:var(--muted);">Post not found.</p>`;
        return;
      }

      document.title = `${post.title} — Sven Amberg`;

      // Populate all SEO meta tags dynamically
      const _url  = window.location.href;
      const _desc = post.excerpt || '';
      function sm(sel, attr, val) { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); }
      sm('meta[name="description"]',         'content', _desc);
      sm('meta[property="og:url"]',          'content', _url);
      sm('meta[property="og:title"]',        'content', post.title);
      sm('meta[property="og:description"]',  'content', _desc);
      sm('meta[name="twitter:title"]',       'content', post.title);
      sm('meta[name="twitter:description"]', 'content', _desc);
      sm('link[rel="canonical"]',            'href',    _url);

      const tags = (post.tags || []).map(t => `<span class="blog-tag">${t}</span>`).join(' ');

      container.innerHTML = `
        <a class="post-back" href="blog.html">← Back to blog</a>
        <div class="post-date">${formatDate(post.date)} &nbsp;·&nbsp; ${tags}</div>
        <h1 class="post-title-h">${post.title}</h1>
        <div class="post-body">${post.content}</div>
        <div style="margin-top:3rem; padding-top:2rem; border-top:0.5px solid var(--border);">
          <a class="post-back" href="blog.html">← Back to blog</a>
        </div>`;
    })
    .catch(() => {
      document.getElementById('post-container').innerHTML =
        '<div class="loading">Could not load post.</div>';
    });
</script>
</body>
</html>
