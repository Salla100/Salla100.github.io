<main>

  <div class="page-hero">
    <p class="section-label">// writing</p>
    <h1>Notes on space,<br><em style="font-style:italic; color:var(--accent);">engineering & learning</em></h1>
    <p style="margin-top:1rem;">Things I've figured out, found interesting, or want to remember.</p>
  </div>

  <section style="padding-top: 0;">
    <div id="posts-list">
      <div class="loading">Loading…</div>
    </div>
  </section>

</main>

<footer>Built with curiosity · Sven Amberg · Trondheim, Norway</footer>

<script src="js/main.js"></script>
<script>
  fetch('data/posts.json')
    .then(r => r.json())
    .then(posts => {
      const container = document.getElementById('posts-list');
      if (!posts.length) {
        container.innerHTML = '<div class="loading">No posts yet — check back soon.</div>';
        return;
      }

      posts.sort((a, b) => new Date(b.date) - new Date(a.date));

      const byYear = {};
      posts.forEach(p => {
        const y = new Date(p.date).getFullYear();
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(p);
      });

      let html = '';
      Object.keys(byYear).sort((a, b) => b - a).forEach(year => {
        html += `<div style="margin-bottom:3rem;">
          <p class="section-label" style="margin-bottom:1.25rem;">${year}</p>
          <div class="blog-grid">`;
        byYear[year].forEach(p => {
          const tags = (p.tags || []).map(t => `<span class="blog-tag">${t}</span>`).join(' ');
          html += `
            <a class="blog-card" href="post.html?id=${encodeURIComponent(p.id)}">
              <div class="blog-date">${formatDate(p.date)}</div>
              <h3>${p.title}</h3>
              <p>${p.excerpt}</p>
              <div style="margin-top:1rem;">${tags}</div>
            </a>`;
        });
        html += `</div></div>`;
      });

      container.innerHTML = html;
    })
    .catch(() => {
      document.getElementById('posts-list').innerHTML =
        '<div class="loading">Could not load posts.</div>';
    });
</script>
</body>
</html>
